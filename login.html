<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#0047d4,#00bfff);
}

.login-box{
    background:#fff;
    padding:40px;
    width:350px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
    color:#0047d4;
}

.input-group{
    margin-bottom:15px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

.input-group input:focus{
    border-color:#0047d4;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0047d4;
    color:white;
    font-size:16px;
    cursor:pointer;
    
}

button:hover{
    background:#0032a0;
}

.signup{
    text-align:center;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form>
        <div class="input-group">
            <input type="email" placeholder="Email Address" required>
        </div>

        <div class="input-group">
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>

        <div class="signup">
            Don't have an account?
            <a href="#">Register</a>
        </div>
    </form>
</div>

</body>
</html>
