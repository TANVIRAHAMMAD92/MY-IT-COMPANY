<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0047d4,#00bfff);
}

.container{
    width:400px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.container h2{
    text-align:center;
    margin-bottom:20px;
    color:#0047d4;
}

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

.input-box input:focus{
    border-color:#0047d4;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0047d4;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#0033a0;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

.login-link a{
    color:#0047d4;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <h2>Create Account</h2>

    <form action="#" method="post">

        <div class="input-box">
            <input type="text" name="fullname" placeholder="Full Name" required>
        </div>

        <div class="input-box">
            <input type="email" name="email" placeholder="Email Address" required>
        </div>

        <div class="input-box">
            <input type="tel" name="phone" placeholder="Phone Number" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <div class="input-box">
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="btn">Register</button>

        <div class="login-link">
            Already have an account?
            <a href="login.html">Login</a>
        </div>

    </form>
</div>

</body>
</html>
